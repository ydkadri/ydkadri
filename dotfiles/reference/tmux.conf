# Tmux Configuration
# You currently have no tmux.conf - this is a recommended starting configuration

# === True color support ===
# Enables proper colors in terminal
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# === Mouse support ===
# Allows using mouse to select panes, resize, scroll
set -g mouse on

# === Better prefix key ===
# Default Ctrl+B is awkward - Ctrl+A is easier
# (Comment out if you prefer default Ctrl+B)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# === Start windows and panes at 1, not 0 ===
# Makes switching with keyboard (1-9) more intuitive
set -g base-index 1
setw -g pane-base-index 1

# === Renumber windows when one is closed ===
# Prevents gaps in window numbers
set -g renumber-windows on

# === Increase scrollback buffer ===
# Default is 2000, this gives more history
set -g history-limit 50000

# === Escape time ===
# Reduce delay for escape sequences (faster vim)
set -sg escape-time 10

# === Focus events ===
# Allows vim to detect when you switch back to a pane
set -g focus-events on

# === Vim-like pane navigation ===
# Use hjkl to navigate between panes (like vim splits)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# === Vim-like pane resizing ===
# Hold prefix and use HJKL to resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# === Split panes with current directory ===
# New panes inherit the directory of current pane
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# === Better split pane bindings ===
# | and - are more intuitive for splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# === Reload config ===
# Quickly reload tmux config without restarting
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# === Copy mode improvements ===
# Use vim keybindings in copy mode
setw -g mode-keys vi
# v to begin selection, y to yank (like vim)
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
# Make copying to clipboard work on macOS
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# === Status bar ===
# Position at top (easier to see with terminal at bottom of screen)
set -g status-position top

# === Status bar styling ===
set -g status-style bg=colour235,fg=colour255
set -g status-left-length 40
set -g status-left '#[fg=colour255,bold] #S #[default]'
set -g status-right '#[fg=colour255] %H:%M %d-%b-%y '

# === Window status styling ===
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format '#[fg=colour0,bg=colour255,bold] #I:#W '

# === Pane border styling ===
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour255

# === Activity monitoring ===
# Highlight windows with activity (but don't show notifications)
setw -g monitor-activity on
set -g visual-activity off

